name: snu-routine-generator

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: snu-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:?MONGO_ROOT_PASS is required}
      MONGO_INITDB_DATABASE: snu_routine
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Express backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snu-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy   # waits for Mongo ping to pass
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS}@mongo:27017/snu_routine?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Never expose port 5000 to the internet — only the frontend talks to it
    # Remove this expose block in production and use the Nginx proxy instead
    expose:
      - "5000"

  # ── Next.js frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — must not be secret
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
    container_name: snu-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - internal
      - external

networks:
  internal:
    # Backend ↔ Mongo communication is isolated — never reachable from outside
    internal: true
  external:
    # Frontend is the only service exposed to the host network

volumes:
  mongo_data:
    driver: local